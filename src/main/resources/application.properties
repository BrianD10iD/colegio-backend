spring.application.name=colegio

server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST}:6543/${DB_NAME}?prepareThreshold=0
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.datasource.hikari.connection-init-sql=SET SESSION CHARACTERISTICS AS TRANSACTION ISOLATION LEVEL READ COMMITTED

spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=ColegioCarlSaganSecretKey2025Minimo32Chars!!
app.jwt.expiration-ms=86400000
